<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I LOVE YOU JESYYY 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(-45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .love-text {
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0px #ff6b6b, 6px 6px 0px #feca57;
            margin-bottom: 20px;
            animation: bounce 2s infinite, rainbow 3s infinite;
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .jesyyy {
            font-size: 5rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24, #f0932b);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 3s ease infinite, shake 0.5s infinite, float 3s ease-in-out infinite;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            display: inline-block;
        }

        @keyframes gradientText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            75% { transform: rotate(-2deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff69b4;
            animation: heartFloat 4s linear infinite;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .star {
            position: absolute;
            color: #7230ce;
            font-size: 16px;
            animation: starTwinkle 2s infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 3;
            animation: bubbleFloat 6s infinite;
        }

        @keyframes bubbleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        .click-message {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        @media (max-width: 768px) {
            .love-text {
                font-size: 2.5rem;
            }
            .jesyyy {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="click-message">Klik teks untuk efek spesial! 💖</div>
    
    <div class="hearts" id="hearts"></div>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <div class="love-text" onclick="createExplosion()">
            I LOVE YOU!
        </div>
        <div class="jesyyy" onclick="createExplosion()">
            jesyyy 💕✨
        </div>
    </div>

    <script>
        // Membuat hati mengambang
        function createHeart() {
            const hearts = document.getElementById('hearts');
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['💖', '💕', '💗', '💓', '💞', '💝'][Math.floor(Math.random() * 6)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            hearts.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Membuat bintang berkelap-kelip
        function createStar() {
            const stars = document.getElementById('stars');
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = ['⭐', '✨', '🌟'][Math.floor(Math.random() * 3)];
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            stars.appendChild(star);

            setTimeout(() => {
                star.remove();
            }, 4000);
        }

        // Membuat bubble
        function createBubble() {
            const hearts = document.querySelector('.hearts');
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.width = bubble.style.height = (Math.random() * 40 + 20) + 'px';
            bubble.style.animationDuration = (Math.random() * 3 + 4) + 's';
            hearts.appendChild(bubble);

            setTimeout(() => {
                bubble.remove();
            }, 7000);
        }

        // Efek ledakan saat diklik
        function createExplosion() {
            for(let i = 0; i < 20; i++) {
                setTimeout(() => {
                    createHeart();
                    createStar();
                }, i * 100);
            }
        }

        // Inisialisasi animasi
        setInterval(createHeart, 300);
        setInterval(createStar, 800);
        setInterval(createBubble, 1500);

        // Efek hover
        document.querySelector('.love-text').addEventListener('mouseenter', function() {
            this.style.transform = 'scale(1.2) rotate(5deg)';
        });

        document.querySelector('.love-text').addEventListener('mouseleave', function() {
            this.style.transform = 'scale(1) rotate(0deg)';
        });

        document.querySelector('.jesyyy').addEventListener('mouseenter', function() {
            this.style.transform = 'scale(1.1) rotate(-5deg)';
        });

        document.querySelector('.jesyyy').addEventListener('mouseleave', function() {
            this.style.transform = 'scale(1) rotate(0deg)';
        });
    </script>
</body>
</html>
